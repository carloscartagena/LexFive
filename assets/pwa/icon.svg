    <line x1="216" y1="300" x2="296" y2="300"/>
  </g>
  <path d="M156 246 a30 18 0 0 0 60 0 z" fill="url(#gold)"/>
  <path d="M296 246 a30 18 0 0 0 60 0 z" fill="url(#gold)"/>
