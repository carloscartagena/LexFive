<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="LexFive opción 4">
  <defs>
    <linearGradient id="o4bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#16273d"/><stop offset="1" stop-color="#0e1b2c"/></linearGradient>
    <linearGradient id="o4gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e7d3a1"/><stop offset="0.5" stop-color="#c2a25a"/><stop offset="1" stop-color="#a8853c"/></linearGradient>
  </defs>
  <rect width="64" height="64" rx="13" fill="url(#o4bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="11" fill="none" stroke="url(#o4gold)" stroke-width="1.4"/>
  <!-- Balanza GRANDE cuyo mastil nace de un nodo de circuito (derecho + tecnologia) -->
  <g fill="none" stroke="url(#o4gold)" stroke-linecap="round" stroke-linejoin="round">
    <!-- brazo -->
    <path d="M16 19 L48 19" stroke-width="2.8"/>
    <!-- mastil -->
    <path d="M32 15 L32 40" stroke-width="2.8"/>
    <!-- cadenas -->
    <path d="M16 19 L11 28 M16 19 L21 28" stroke-width="1.4"/>
    <path d="M48 19 L43 28 M48 19 L53 28" stroke-width="1.4"/>
    <!-- platillos grandes -->
    <path d="M9 28 Q16 37 23 28" stroke-width="2.2"/>
    <path d="M41 28 Q48 37 55 28" stroke-width="2.2"/>
    <!-- base tipo placa de circuito -->
    <path d="M22 44 L42 44" stroke-width="3"/>
    <path d="M32 40 L32 44" stroke-width="2.4"/>
  </g>
  <!-- pistas y nodos de circuito que salen de la base (tecnologia) -->
  <g stroke="url(#o4gold)" stroke-width="1.2" fill="url(#o4gold)" opacity="0.85">
    <path d="M22 44 L16 49" fill="none"/><circle cx="15" cy="50" r="1.8"/>
    <path d="M42 44 L48 49" fill="none"/><circle cx="49" cy="50" r="1.8"/>
    <circle cx="32" cy="13.5" r="2.6"/>
  </g>
  <text x="32" y="60.5" text-anchor="middle" font-family="Georgia, serif" font-size="6.5" font-weight="700" letter-spacing="2" fill="url(#o4gold)">LEXFIVE</text>
</svg>
