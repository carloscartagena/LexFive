<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="LexFive - Monograma LF con circuito">
  <defs>
    <linearGradient id="l6bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#16273d"/><stop offset="1" stop-color="#0e1b2c"/></linearGradient>
    <linearGradient id="l6gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e7d3a1"/><stop offset="0.5" stop-color="#c2a25a"/><stop offset="1" stop-color="#a8853c"/></linearGradient>
  </defs>
  <rect width="64" height="64" rx="13" fill="url(#l6bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="11" fill="none" stroke="url(#l6gold)" stroke-width="1.4"/>

  <!-- Trazos de circuito (decoración tecnológica) -->
  <g fill="none" stroke="url(#l6gold)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.55">
    <path d="M7 14 H13 V20"/>
    <path d="M7 22 H10 V27"/>
    <path d="M57 14 H51 V21"/>
    <path d="M57 24 H53 V29"/>
    <path d="M9 46 V40 H14"/>
    <path d="M55 46 V41 H50"/>
    <path d="M20 9 V12 H25"/>
    <path d="M44 9 V12 H39"/>
  </g>
  <g fill="url(#l6gold)" opacity="0.7">
    <circle cx="7" cy="14" r="1.4"/><circle cx="13" cy="20" r="1.4"/>
    <circle cx="7" cy="22" r="1.4"/><circle cx="57" cy="14" r="1.4"/>
    <circle cx="51" cy="21" r="1.4"/><circle cx="57" cy="24" r="1.4"/>
    <circle cx="9" cy="46" r="1.4"/><circle cx="55" cy="46" r="1.4"/>
    <circle cx="25" cy="9" r="1.4"/><circle cx="39" cy="9" r="1.4"/>
  </g>

  <!-- Monograma LF -->
  <g fill="url(#l6gold)">
    <!-- L -->
    <rect x="15" y="15" width="6" height="27" rx="1.2"/>
    <rect x="15" y="36" width="15" height="6" rx="1.2"/>
    <!-- F -->
    <rect x="37" y="15" width="6" height="27" rx="1.2"/>
    <rect x="37" y="15" width="14" height="6" rx="1.2"/>
    <rect x="37" y="25" width="11" height="5" rx="1.2"/>
  </g>

  <!-- 5 al centro -->
  <text x="29.5" y="34" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="700" fill="url(#l6gold)">5</text>

  <text x="32" y="60.5" text-anchor="middle" font-family="Georgia, serif" font-size="6.2" font-weight="700" letter-spacing="2" fill="url(#l6gold)">LEXFIVE</text>
</svg>
