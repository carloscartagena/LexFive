<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="LexFive - Martillo y balanza">
  <defs>
    <linearGradient id="l3bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#16273d"/><stop offset="1" stop-color="#0e1b2c"/></linearGradient>
    <linearGradient id="l3gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e7d3a1"/><stop offset="0.5" stop-color="#c2a25a"/><stop offset="1" stop-color="#a8853c"/></linearGradient>
  </defs>
  <rect width="64" height="64" rx="13" fill="url(#l3bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="11" fill="none" stroke="url(#l3gold)" stroke-width="1.4"/>
  <!-- Mazo / martillo del juez (gavel) grande -->
  <g fill="none" stroke="url(#l3gold)" stroke-linecap="round" stroke-linejoin="round">
    <!-- cabeza del mazo (inclinada) -->
    <rect x="30" y="14" width="20" height="10" rx="2.4" transform="rotate(45 40 19)" stroke-width="2.6"/>
    <!-- bandas de la cabeza -->
    <path d="M33.5 17.5 L40.5 24.5 M44 14 L51 21" stroke-width="1.6"/>
    <!-- mango -->
    <path d="M30 28 L18 40" stroke-width="3"/>
    <!-- base / taco de sonido -->
    <path d="M14 50 L34 50" stroke-width="3.4"/>
    <path d="M18 46 L30 46" stroke-width="2.2"/>
  </g>
  <!-- Balanza pequeña acompañante arriba a la derecha -->
  <g fill="none" stroke="url(#l3gold)" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <path d="M48 30 L48 44" stroke-width="1.8"/>
    <path d="M42 33 L54 33" stroke-width="1.8"/>
    <path d="M40 33 Q42.5 37 45 33" stroke-width="1.2"/>
    <path d="M51 33 Q53.5 37 56 33" stroke-width="1.2"/>
    <path d="M44 44 L52 44" stroke-width="2"/>
  </g>
  <circle cx="48" cy="29.5" r="1.7" fill="url(#l3gold)"/>
  <text x="32" y="61" text-anchor="middle" font-family="Georgia, serif" font-size="6.4" font-weight="700" letter-spacing="2" fill="url(#l3gold)">LEXFIVE</text>
</svg>
