<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Sello LexFive Abogados">
  <defs>
    <path id="arcTop" d="M 30 100 A 70 70 0 0 1 170 100" fill="none"/>
    <path id="arcBottom" d="M 34 100 A 66 66 0 0 0 166 100" fill="none"/>
  </defs>
  <g fill="none" stroke="#0e1b2c" stroke-width="2.4">
    <circle cx="100" cy="100" r="92"/>
    <circle cx="100" cy="100" r="84"/>
    <circle cx="100" cy="100" r="58"/>
